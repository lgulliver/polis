services:
  # ── Minecraft server ────────────────────────────────────────────────────────
  mc-server:
    image: itzg/minecraft-server
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.4"
      # Bots connect with username only — no Mojang/Microsoft auth required
      ONLINE_MODE: "false"
      DIFFICULTY: hard
      PVP: "false"
      MAX_PLAYERS: 30
      MEMORY: "2G"
      # Geyser allows Bedrock clients (Nintendo Switch, mobile) to connect
      PLUGINS: >-
        https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot
    ports:
      - "25565:25565"       # Java Edition
      - "19132:19132/udp"   # Bedrock Edition via Geyser
    volumes:
      - mc-data:/data
    healthcheck:
      test: mc-health
      start_period: 120s
      interval: 15s
      retries: 8

  # ── Local LLM (Ollama) ──────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      start_period: 10s
      interval: 5s
      retries: 12
    # NVIDIA GPU passthrough — requires NVIDIA Container Toolkit
    # (Docker Desktop on Windows with WSL2 handles this automatically)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Pulls the model on first run (no-op if already cached)
  ollama-init:
    image: ollama/ollama
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull ${OLLAMA_MODEL:-qwen2.5:7b}"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  # ── Colony — all agents in one process ──────────────────────────────────────
  colony:
    build: .
    volumes:
      - ./logs:/logs
      - colony-data:/data
    environment:
      MC_HOST: mc-server
      MC_PORT: 25565
      LOG_DIR: /logs
      DATA_DIR: /data
      AUTONOMY_ENABLED: ${AUTONOMY_ENABLED:-false}
      AUTONOMY_TICK_SECONDS: ${AUTONOMY_TICK_SECONDS:-30}
      POPULATION_ENABLED: ${POPULATION_ENABLED:-false}
      WANDERER_ARRIVAL_MINUTES: ${WANDERER_ARRIVAL_MINUTES:-10}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: http://ollama:11434/v1
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      # Only needed when LLM_PROVIDER=openai
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      mc-server:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    restart: on-failure

volumes:
  mc-data:
  ollama-data:
  colony-data:

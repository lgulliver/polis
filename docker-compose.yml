services:
  # ── Minecraft server ────────────────────────────────────────────────────────
  mc-server:
    image: itzg/minecraft-server
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.4"
      # Bots connect with username only — no Mojang/Microsoft auth required
      ONLINE_MODE: "false"
      DIFFICULTY: normal
      PVP: "false"
      MAX_PLAYERS: 30
      MEMORY: "2G"
      RCON_PASSWORD: polisrcon
      # Geyser for Bedrock/Switch clients (Nintendo Switch, mobile)
      PLUGINS: >-
        https://download.geysermc.org/v2/projects/geyser/versions/latest/builds/latest/downloads/spigot
      # ViaVersion bridges Java protocol versions so Geyser works correctly
      SPIGET_RESOURCES: "19254"
      # BlueMap renders a live 3D browser map of the world at :8100
      MODRINTH_PROJECTS: "bluemap"
    ports:
      - "25565:25565"       # Java Edition
      - "8100:8100"         # BlueMap live 3D world map → http://localhost:8100
      - "19133:19132/udp"   # Geyser Bedrock port — BedrockConnect redirects Switch here
      - "25575:25575"       # RCON — used by rcon-web-admin
    volumes:
      - mc-data:/data
      - ./configs/bluemap:/config/plugins/BlueMap  # pre-accepts download so BlueMap renders on first start
    healthcheck:
      test: mc-health
      start_period: 120s
      interval: 15s
      retries: 8

  # ── Local LLM (Ollama) ──────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      start_period: 10s
      interval: 5s
      retries: 12
    # NVIDIA GPU passthrough — requires NVIDIA Container Toolkit
    # (Docker Desktop on Windows with WSL2 handles this automatically)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Pulls the model on first run (no-op if already cached)
  ollama-init:
    image: ollama/ollama
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull ${OLLAMA_MODEL:-qwen2.5:7b}"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  # ── Colony — all agents in one process ──────────────────────────────────────
  colony:
    build: .
    volumes:
      - ./logs:/logs
      - colony-data:/data
    environment:
      MC_HOST: mc-server
      MC_PORT: 25565
      LOG_DIR: /logs
      DATA_DIR: /data
      AUTONOMY_ENABLED: ${AUTONOMY_ENABLED:-false}
      AUTONOMY_TICK_SECONDS: ${AUTONOMY_TICK_SECONDS:-30}
      POPULATION_ENABLED: ${POPULATION_ENABLED:-false}
      WANDERER_ARRIVAL_MINUTES: ${WANDERER_ARRIVAL_MINUTES:-10}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: http://ollama:11434/v1
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:7b}
      # Only needed when LLM_PROVIDER=openai
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      mc-server:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    restart: on-failure

  # ── BedrockConnect — Switch / console proxy ─────────────────────────────────
  # Switch cannot enter custom IPs — this service intercepts featured-server
  # connections via a DNS override and proxies them to Geyser on mc-server.
  #
  # Setup on Switch:
  #   Settings → Internet → your network → Change Settings
  #   DNS: Manual → Primary DNS: <your PC's local IP>
  # Then launch Minecraft → Play → Servers → select Mineplex (or any featured server)
  # BedrockConnect will show a server list; choose "Polis" to join.
  bedrock-connect:
    build: ./bedrock-connect
    ports:
      - "19132:19132/udp"   # Bedrock proxy — Switch connects here
      - "53:53/udp"         # DNS — Switch DNS should be set to your PC's local IP
    depends_on:
      - mc-server

  # ── Observability ────────────────────────────────────────────────────────────
  # Dozzle: browser log viewer for all containers → http://localhost:9999
  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9999:8080"
    environment:
      DOZZLE_LEVEL: info

volumes:
  mc-data:
  ollama-data:
  colony-data:
